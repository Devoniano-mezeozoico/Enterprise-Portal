{% extends "honeypot/base.html" %}
{% block content %}
<header class="fake-page-head">
  <h1>{{ titulo }}</h1>
  <p>{{ subtitulo }}</p>
</header>
<section class="fake-card">
  <div class="fake-table-wrap">
    <table class="fake-table">
      <thead>
        <tr>
          {% for col in colunas %}<th>{{ col }}</th>{% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in linhas %}
        <tr>
          {% for key in chaves %}<td>{{ row[key] }}</td>{% endfor %}
        </tr>
        {% else %}
        <tr><td colspan="{{ colunas|length }}">Nenhum registro encontrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
