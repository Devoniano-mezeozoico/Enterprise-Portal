{% extends "base.html" %}
{% block title %}Gerador de RPA{% endblock %}
{% block content %}
<div class="page-title">
    <h1>Gerador de RPA</h1>
    <p>Descreva os passos do processo e gere um script de automação inicial.</p>
</div>

<div class="card">
    <div class="form-group">
        <label>Nome do processo</label>
        <input type="text" id="nomeProcesso" placeholder="Ex.: conferencia_notas_fiscais">
    </div>
    <div class="form-group">
        <label>Passos (um por linha)</label>
        <textarea id="passos" rows="6" placeholder="Abrir o sistema&#10;Buscar a nota fiscal&#10;Validar os dados&#10;Salvar relatório"></textarea>
    </div>
    <button class="btn-primary" id="btnGerar">
        <i class="fa-solid fa-gears"></i> Gerar script
    </button>

    <br><br>
    <pre id="resultado" style="background:#f5f5f5;border-radius:10px;padding:15px;white-space:pre-wrap;display:none;"></pre>
</div>

<script>
document.getElementById("btnGerar").addEventListener("click", async function () {
    const nomeProcesso = document.getElementById("nomeProcesso").value;
    const passos = document.getElementById("passos").value;
    const resultado = document.getElementById("resultado");

    try {
        const resposta = await fetch("{{ url_for('gerador_rpa.gerar') }}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nome_processo: nomeProcesso, passos: passos })
        });
        const dados = await resposta.json();
        resultado.style.display = "block";
        resultado.textContent = dados.script || dados.erro || "Erro ao gerar script.";
    } catch (erro) {
        resultado.style.display = "block";
        resultado.textContent = "Falha ao conectar com o servidor.";
    }
});
</script>
{% endblock %}
